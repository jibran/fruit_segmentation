# Base configuration for fruit segmentation training.
# Override individual fields in model-specific configs.

data:
  root_dir: "data/processed"
  image_size: 512          # Must be divisible by 32
  num_classes: 17          # 16 fruit classes (0-15) + 1 background (16)
  batch_size: 8
  num_workers: 4
  pin_memory: true
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1

augmentation:
  horizontal_flip: true
  vertical_flip: false
  rotation_limit: 30
  zoom_limit: 0.2
  shear_limit: 10
  brightness_contrast: true
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std: [0.229, 0.224, 0.225]

training:
  epochs_phase1: 15        # Backbone frozen — decoder only
  epochs_phase2: 30        # End-to-end fine-tuning
  lr_decoder: 1.0e-3       # Phase 1 decoder LR
  lr_backbone_phase2: 1.0e-5   # Phase 2 backbone LR (discriminative)
  lr_decoder_phase2: 1.0e-4    # Phase 2 decoder LR
  weight_decay: 1.0e-4
  grad_clip: 1.0
  scheduler: "cosine"      # "cosine" | "step" | "plateau"
  warmup_epochs: 2
  loss: "cross_entropy"    # "cross_entropy" | "dice" | "combined"
  ignore_index: 16         # background class excluded from loss
  class_weights: null      # null = uniform; "auto" = inverse frequency

checkpoints:
  best_dir: "checkpoints/best"
  latest_dir: "checkpoints/latest"
  save_every_n_epochs: 5

logging:
  log_dir: "logs"
  log_interval: 10         # Log every N batches

model:
  size: "tiny"             # "tiny" | "small" | "base"
