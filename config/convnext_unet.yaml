# ConvNeXt-V2 U-Net configuration.
# Inherits defaults from base_config.yaml — only overrides are listed here.

defaults:
  - base_config

model:
  name: "convnext_unet"
  backbone: "convnextv2"   # timm model family
  size: "tiny"             # "tiny" | "small" | "base"
  pretrained: true
  freeze_backbone_phase1: true

training:
  epochs_phase1: 15
  epochs_phase2: 30
  lr_decoder: 1.0e-3
  lr_backbone_phase2: 1.0e-5
  lr_decoder_phase2: 1.0e-4
